<template>
    <lightning-card title="Manager Approvals" icon-name="standard:approval">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template lwc:if={hasRows}>
                <lightning-datatable
                    key-field="Id"
                    data={rows}
                    columns={columns}
                    onrowaction={handleRowAction}
                ></lightning-datatable>
            </template>
            <template lwc:else>
                <p class="slds-text-color_weak">No pending requests to approve.</p>
            </template>
        </div>
    </lightning-card>
</template>
